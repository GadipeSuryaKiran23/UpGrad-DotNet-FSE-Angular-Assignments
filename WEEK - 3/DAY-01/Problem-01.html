<!DOCTYPE html>
<html>
<head>
    <title>Student Feedback Form</title>

   
<script src="https://code.jquery.com/jquery-4.0.0.js"></script>

<style>
    body {
        font-family: Arial;
    }
    .msg {
        margin-top: 15px;
        font-weight: bold;
     }
</style>
</head>

<body>

    <h3>Student Feedback Form</h3>
    <hr>

    Name :
    <input type="text" id="name">
    <br><br>

    Email :
    <input type="text" id="email">
    <br><br>

    Course Rating :
    <select id="rating">
        <option value="">--Select--</option>
        <option>Excellent</option>
        <option>Good</option>
        <option>Average</option>
        <option>Poor</option>
    </select>
    <br><br>

    Comments :
    <br>
    <textarea id="comments"></textarea>
    <br><br>

    <input type="button" id="submitBtn" value="Submit Feedback">

    <p id="result" class="msg"></p>

    <script>
        $(document).ready(function () {

            $("#submitBtn").click(function () {

                let name = $("#name").val();
                let email = $("#email").val();

                if (name == "" || email == "") {
                    $("#result").text("Please enter Name and Email")
                                 .css("color", "red");
                }
                else {
                    $("#result").text("Thank you! Your feedback has been submitted.")
                                 .css("color", "green");

                    // Clear form fields
                    $("#name").val("");
                    $("#email").val("");
                    $("#rating").val("");
                    $("#comments").val("");
                }
            });

        });
    </script>

</body>
</html>
