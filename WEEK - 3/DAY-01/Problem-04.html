<!DOCTYPE html>
<html>
<head>
    <title>To-Do List App</title>

    <!-- jQuery 4.0.0 CDN -->
    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>

    <style>
        body {
            font-family: Arial;
        }
        .completed {
            text-decoration: line-through;
            color: gray;
        }
        li {
            margin-bottom: 8px;
        }
        button {
            margin-left: 8px;
        }
    </style>
</head>

<body>

    <h3>Interactive To-Do List</h3>
    <hr>

    Task :
    <input type="text" id="taskInput">
    <button id="addBtn">Add</button>

    <br><br>

    <ul id="taskList"></ul>

    <hr>

    <p>Total Tasks : <span id="totalCount">0</span></p>
    <p>Completed Tasks : <span id="completedCount">0</span></p>

    <script>
        $(document).ready(function () {
            let total = 0;
            let completed = 0;
            // Add task
            $("#addBtn").click(function () {
                let task = $("#taskInput").val();
                if (task !== "") {
                    $("#taskList").append(
                        "<li>" +
                        "<span class='taskText'>" + task + "</span>" +
                        "<button class='doneBtn'>Done</button>" +
                        "<button class='deleteBtn'>Delete</button>" +
                        "</li>"
                    );
                    total++;
                    $("#totalCount").text(total);
                    $("#taskInput").val("");
                }
            });
            // Event delegation for Done button
            $("#taskList").on("click", ".doneBtn", function () {

                $(this).siblings(".taskText").toggleClass("completed");

                if ($(this).siblings(".taskText").hasClass("completed")) {
                    completed++;
                } else {
                    completed--;
                }
                $("#completedCount").text(completed);
            });
            // Event delegation for Delete button
            $("#taskList").on("click", ".deleteBtn", function () {
                let isCompleted = $(this)
                                  .siblings(".taskText")
                                  .hasClass("completed");
                if (isCompleted) {
                    completed--;
                    $("#completedCount").text(completed);
                }
                total--;
                $("#totalCount").text(total);
                $(this).parent().remove();
            });
        });
    </script>

</body>
</html>
