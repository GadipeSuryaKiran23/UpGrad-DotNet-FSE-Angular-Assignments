<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Listing</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- ===== PAGE TITLE ===== -->
<div class="container text-center mt-4">
    <h2>Electronics Store</h2>
    <p class="text-muted">Browse our latest products</p>
</div>

<!-- ===== PRODUCT LISTING ===== -->
<div class="container mt-4">
    <div class="row g-4">

        <!-- Product 1 -->
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 text-center">
                <div class="card-body">
                    <h5 class="card-title">Smartphone</h5>
                    <p class="card-text">Latest Android smartphone.</p>
                    <button class="btn btn-primary btn-sm">Add to Cart</button>
                    <button class="btn btn-outline-secondary btn-sm">View Details</button>
                </div>
            </div>
        </div>

        <!-- Product 2 -->
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 text-center">
                <div class="card-body">
                    <h5 class="card-title">Laptop</h5>
                    <p class="card-text">High performance and durable laptop.</p>
                    <button class="btn btn-primary btn-sm">Add to Cart</button>
                    <button class="btn btn-outline-secondary btn-sm">View Details</button>
                </div>
            </div>
        </div>

        <!-- Product 3 -->
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 text-center">
                <div class="card-body">
                    <h5 class="card-title">Headphones</h5>
                    <p class="card-text">Noise cancelling headphones.</p>
                    <button class="btn btn-primary btn-sm">Add to Cart</button>
                    <button class="btn btn-outline-secondary btn-sm">View Details</button>
                </div>
            </div>
        </div>

        <!-- Product 4 -->
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 text-center">
                <div class="card-body">
                    <h5 class="card-title">Smart Watch</h5>
                    <p class="card-text">Fitness tracking smart watch.</p>
                    <button class="btn btn-primary btn-sm">Add to Cart</button>
                    <button class="btn btn-outline-secondary btn-sm">View Details</button>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
