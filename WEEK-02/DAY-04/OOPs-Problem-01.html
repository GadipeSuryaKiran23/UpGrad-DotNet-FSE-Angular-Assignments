<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OOP Hands-On - Student Class</title>

    <style>
        .student-box {
            border: 2px solid #4CAF50;
            padding: 12px;
            margin: 10px 0;
            width: 400px;
            font-family: Arial, sans-serif;
            background-color: #F6FFF6;
        }
    </style>
</head>
<body>

<h3>Class & Object -Encapsulation</h3>
<hr/>

<button onclick="showStudents()">Show Student Details</button>

<div id="output"></div>

<script>
    // Student class -Encapsulation
    class Student {

        constructor(name, rollNumber, marks) {
            this.name = name;
            this.rollNumber = rollNumber;
            this.marks = marks;
        }

        // Returns student details as string
        getDetails() {
            return `Name: ${this.name}<br/>
                    Roll No: ${this.rollNumber}<br/>
                    Marks: ${this.marks}`;
        }

        // Returns grade based on marks
        getGrade() {
            if (this.marks >= 90) {
                return "A";
            } else if (this.marks >= 75) {
                return "B";
            } else if (this.marks >= 50) {
                return "C";
            } else {
                return "Fail";
            }
        }
    }

    function showStudents() {

        const outputDiv = document.getElementById("output");
        outputDiv.innerHTML = ""; // clear previous output

        // Creating student objects
        const s1 = new Student("Surya", 101, 92);
        const s2 = new Student("Kiran", 102, 68);

        // Display student 1
        outputDiv.innerHTML += `
            <div class="student-box">
                <h4>Student 1</h4>
                ${s1.getDetails()}<br/>
                <b>Grade:</b> ${s1.getGrade()}
            </div>
        `;

        // Display student 2
        outputDiv.innerHTML += ` <div class="student-box"> <h4>Student 2</h4>
                ${s2.getDetails()}<br/><b>Grade:</b> ${s2.getGrade()} </div>  `;
    }
</script>

</body>
</html>
