<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Event Dashboard</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!--  NAVBAR  -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">College Events</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="#">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Events</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- DASHBOARD CONTENT  -->
<div class="container-fluid mt-4">
    <div class="row g-4">

        <!--EVENT LIST  -->
        <div class="col-sm-12 col-md-8 col-lg-9 col-xl-9">
            <div class="card h-100">
                <div class="card-header bg-dark text-white">
                    Upcoming Events
                </div>

                <div class="card-body">
                    <table class="table table-bordered table-striped">
                        <thead class="table-secondary">
                            <tr>
                                <th>Event Name</th>
                                <th>Date</th>
                                <th>Venue</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Tech Fest</td>
                                <td>10-Oct-2026</td>
                                <td>Auditorium</td>
                            </tr>
                            <tr>
                                <td>Cultural Day</td>
                                <td>15-Oct-2026</td>
                                <td>Main Ground</td>
                            </tr>
                        </tbody>
                    </table>

                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#eventModal">
                        Add New Event
                    </button>
                </div>
            </div>
        </div>

        <!--  QUICK FORM PANEL -->
        <div class="col-sm-12 col-md-4 col-lg-3 col-xl-3">
            <div class="card h-100">
                <div class="card-header bg-secondary text-white">
                    Event Registration
                </div>

                <div class="card-body">
                    <form class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label class="form-label">Student Name</label>
                            <input type="text" class="form-control" required>
                            <div class="invalid-feedback">
                                Name is required
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Event</label>
                            <select class="form-select" required>
                                <option value="">Select Event</option>
                                <option>Tech Fest</option>
                                <option>Cultural Day</option>
                            </select>
                            <div class="invalid-feedback">
                                Please select an event
                            </div>
                        </div>

                        <button class="btn btn-success w-100" type="submit">
                            Register
                        </button>
                    </form>
                </div>
            </div>
        </div>

    </div>
</div>

<!--  MODAL  -->
<div class="modal fade" id="eventModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Add New Event</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <form>
                    <div class="mb-3">
                        <label class="form-label">Event Name</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Event Date</label>
                        <input type="date" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Venue</label>
                        <input type="text" class="form-control">
                    </div>
                </form>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button class="btn btn-primary">Save Event</button>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS Bundle (Required for Modal) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Simple Bootstrap Validation Script -->
<script>
(() => {
    'use strict'
    const forms = document.querySelectorAll('.needs-validation')
    Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {
            if (!form.checkValidity()) {
                event.preventDefault()
                event.stopPropagation()
            }
            form.classList.add('was-validated')
        }, false)
    })
})()
</script>

</body>
</html>
