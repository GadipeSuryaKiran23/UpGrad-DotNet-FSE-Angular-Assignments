<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>College Dashboard</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<!--  NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">

    <a class="navbar-brand" href="#">
      <i class="bi bi-mortarboard-fill"></i> College Dashboard
    </a>

    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Departments</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
      </ul>
    </div>

  </div>
</nav>

<!--  MAIN CONTENT -->
<div class="container mt-4">

  <h3 class="text-center mb-4">Dashboard Overview</h3>

  <div class="row text-center">

    <!-- CARD 1 -->
    <div class="col-sm-12 col-md-4 mb-3">
      <div class="card border shadow-sm">
        <div class="card-body">
          <i class="bi bi-people-fill fs-1 text-primary"></i>
          <h5 class="mt-2">Students</h5>
          <p>Total Students: 1200</p>
        </div>
      </div>
    </div>

    <!-- CARD 2 -->
    <div class="col-sm-12 col-md-4 mb-3">
      <div class="card border shadow-sm">
        <div class="card-body">
          <i class="bi bi-building fs-1 text-success"></i>
          <h5 class="mt-2">Departments</h5>
          <p>Total Departments: 8</p>
        </div>
      </div>
    </div>

    <!-- CARD 3 -->
    <div class="col-sm-12 col-md-4 mb-3">
      <div class="card border shadow-sm">
        <div class="card-body">
          <i class="bi bi-calendar-event fs-1 text-danger"></i>
          <h5 class="mt-2">Events</h5>
          <p>Upcoming Events: 5</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer class="bg-light text-center p-3 mt-4">
  © 2026 College Dashboard
</footer>

</body>
</html>
