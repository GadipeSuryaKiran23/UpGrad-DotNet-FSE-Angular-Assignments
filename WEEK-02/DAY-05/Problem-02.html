<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Simple E-Commerce Page</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<!-- NAVBAR WITH OFFCANVAS -->
<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">

    <a class="navbar-brand" href="#">
      <i class="bi bi-cart"></i> MyShop
    </a>

    <button class="navbar-toggler" type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="offcanvas offcanvas-end" id="menu">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title">Menu</h5>
        <button class="btn-close" data-bs-dismiss="offcanvas"></button>
      </div>
      <div class="offcanvas-body">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
        </ul>
      </div>
    </div>

  </div>
</nav>

<!-- HERO SECTION -->
<div class="container text-center mt-4">
  <h1 class="display-5">Welcome to MyShop</h1>
  <p class="text-muted">Buy quality products at best prices</p>
  <button class="btn btn-primary">Shop Now</button>
</div>

<!-- PRODUCT CAROUSEL -->
<div class="container mt-5">
  <h4 class="text-center mb-3">Featured Products</h4>

  <div id="productSlider" class="carousel slide" data-bs-ride="carousel">

    <div class="carousel-inner">

      <div class="carousel-item active text-center">
        <img src="https://via.placeholder.com/300" class="d-block mx-auto">
        <p class="mt-2">Mobile Phone</p>
      </div>

      <div class="carousel-item text-center">
        <img src="https://via.placeholder.com/300" class="d-block mx-auto">
        <p class="mt-2">Laptop</p>
      </div>

      <div class="carousel-item text-center">
        <img src="https://via.placeholder.com/300" class="d-block mx-auto">
        <p class="mt-2">Headphones</p>
      </div>

    </div>

    <button class="carousel-control-prev" data-bs-target="#productSlider" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" data-bs-target="#productSlider" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>

  </div>
</div>

<!-- PRODUCT GRID -->
<div class="container mt-5">
  <div class="row text-center">

    <div class="col-sm-12 col-md-4 mb-3">
      <div class="border p-3">
        <i class="bi bi-phone fs-1"></i>
        <h5>Mobiles</h5>
        <p>Latest phones</p>
      </div>
    </div>

    <div class="col-sm-12 col-md-4 mb-3">
      <div class="border p-3">
        <i class="bi bi-laptop fs-1"></i>
        <h5>Laptops</h5>
        <p>Best laptops</p>
      </div>
    </div>

    <div class="col-sm-12 col-md-4 mb-3">
      <div class="border p-3">
        <i class="bi bi-headphones fs-1"></i>
        <h5>Accessories</h5>
        <p>Quality accessories</p>
      </div>
    </div>

  </div>
</div>

<!-- NEWSLETTER FORM -->
<div class="container mt-5 mb-5">
  <h4 class="text-center">Subscribe to Newsletter</h4>

  <div class="row justify-content-center">
    <div class="col-md-6">

      <form class="needs-validation" novalidate>
        <input type="email" class="form-control mb-3" placeholder="Enter email" required>
        <div class="invalid-feedback">Email required</div>

        <button class="btn btn-primary w-100">Subscribe</button>
      </form>

    </div>
  </div>
</div>

</body>
</html>
