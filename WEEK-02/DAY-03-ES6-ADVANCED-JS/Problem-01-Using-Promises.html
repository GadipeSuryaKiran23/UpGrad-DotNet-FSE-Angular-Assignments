<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Data Fetcher</title>

    <style>
        #output {
            border: 2px solid #4CAF50;
            padding: 15px;
            margin-top: 15px;
            width: 400px;
            font-family: Arial, sans-serif;
            background-color: #F6FFF6;
        }
    </style>
</head>
<body>

    <h2>Weather Data Fetcher</h2>
    <hr/>
    Enter Place:
    <input type="text" id="place" placeholder="Enter city name" />
    <button onclick="getWeatherUsingPromise()">Get Weather (Promise)</button>
    <div id="output"></div>

    <hr/>
    <footer>
        <mark>Note: Weather data fetched asynchronously from public API.</mark>
    </footer>

    <script>
        const outputDiv = document.getElementById("output");

        const WEATHER_URL =  "https://api.open-meteo.com/v1/forecast?latitude=17.3850&longitude=78.4867&current_weather=true";
        //using promise//
        const getWeatherUsingPromise = () => {

            outputDiv.innerHTML = "Fetching weather using Promise";

            fetch(WEATHER_URL).then(response => {
                    if (!response.ok) {
                        throw new Error("Failed to fetch weather data");
                    }
                    return response.json();
                })
                .then(data => {
                    const weather = data.current_weather;

                    outputDiv.innerHTML = `<h3>Weather Report (Promise)</h3>
                        <p><b>Temperature:</b> ${weather.temperature} °C</p>
                        <p><b>Wind Speed:</b> ${weather.windspeed} km/h</p>
                        <p><b>Weather Code:</b> ${weather.weathercode}</p>`;
                })
                .catch(error => {
                    outputDiv.innerHTML =`<span style="color:red;"> Error: ${error.message}</span>`;
                });
        };

    </script>

</body>
</html>
