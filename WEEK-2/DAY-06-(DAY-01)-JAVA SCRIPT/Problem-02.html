<!DOCTYPE html>
<html>
<head>
    <title>Live Form Validation</title>
</head>
<body>

    <h2>Registration Form</h2>
    <hr>

    
    Name :
    <input type="text" id="name" onchange="validateName()" />
    <p id="nameMsg"></p>

    
    Email :
    <input type="text" id="email" onchange="validateEmail()" />
    <p id="emailMsg"></p>

  
    Age :
    <input type="number" id="age" onchange="validateAge()" />
    <p id="ageMsg"></p>

    <hr>

   
    <input type="button" value="Register" onclick="saveData()" />

    <p id="finalMsg"></p>

    <script>

        function validateName() {
            let name = document.getElementById("name").value;

            if (name == "") {
                document.getElementById("nameMsg").innerText = "Name cannot be empty";
            } else {
                document.getElementById("nameMsg").innerText = "Valid Name";
            }
        }

        function validateEmail() {
            let email = document.getElementById("email").value;

            if (email.indexOf("@") == -1) {
                document.getElementById("emailMsg").innerText = "Email must contain @";
            } else {
                document.getElementById("emailMsg").innerText = "Valid Email";
            }
        }

        function validateAge() {
            let age = document.getElementById("age").value;

            if (age <= 18) {
                document.getElementById("ageMsg").innerText = "Age must be greater than 18";
            } else {
                document.getElementById("ageMsg").innerText = "Valid Age";
            }
        }

        function saveData() {

            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let age = document.getElementById("age").value;

            if (name != "" && email.indexOf("@") != -1 && age > 18) {

                sessionStorage.setItem("name", name);
                sessionStorage.setItem("email", email);
                sessionStorage.setItem("age", age);

                document.getElementById("finalMsg").innerText =
                    "Registration Successful. Data stored in sessionStorage.";


            } else {
                document.getElementById("finalMsg").innerText = "Please enter valid details.";
            }
        }

    </script>

</body>
</html>
